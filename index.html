<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>File Share Hub</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='15' fill='%2300aa66'/><text y='75' x='15' font-size='70' fill='white'>F</text></svg>" />
  <style>
    body { font-family: Arial, sans-serif; background: #111; color: white; margin: 0; padding: 0; }
    header { background: #1e1e1e; padding: 20px; text-align: center; border-bottom: 2px solid #333; }
    h1 { margin: 0; color: #00ff99; }
    .warning { background: #330000; color: #ff5555; padding: 15px; text-align: center; font-weight: bold; border-top: 2px solid red; border-bottom: 2px solid red; }
    .container { padding: 20px; max-width: 900px; margin: auto; }
    .upload-box, .files-box { background: #1c1c1c; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
    input[type="file"] { margin-top: 10px; margin-bottom: 10px; color: white; }
    button { background: #00aa66; color: white; border: none; padding: 10px 18px; border-radius: 6px; cursor: pointer; font-size: 16px; }
    button:hover { background: #00cc77; }
    .file-item { background: #222; padding: 12px; border-radius: 8px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
    .download-btn { background: #0066cc; text-decoration: none; color: white; padding: 8px 12px; border-radius: 5px; }
    .download-btn:hover { background: #0088ff; }
    footer { text-align: center; padding: 20px; color: gray; }
  </style>
</head>
<body>

  <header>
    <h1>File Share Hub</h1>
    <p>Uploaduj i deli fajlove (automatski se brišu posle 24h)</p>
  </header>

  <div class="warning">
    WARNING: Fajlovi se brišu posle 24h. Download na sopstvenu odgovornost.
  </div>

  <div class="container">
    <div class="upload-box">
      <h2>Upload fajla</h2>
      <p>Izaberi fajl koji želiš da deliš:</p>
      <input type="file" id="fileInput" />
      <br>
      <button onclick="uploadFile()">Upload</button>
      <p id="status"></p>
    </div>

    <div class="files-box">
      <h2>Dostupni fajlovi</h2>
      <div id="fileList"></div>
    </div>
  </div>

  <footer>
    © 2026 File Share Hub
  </footer>

  <script>
    async function loadFiles() {
      const fileList = document.getElementById("fileList");
      try {
        const res = await fetch("/.netlify/functions/list");
        const { files } = await res.json();
        fileList.innerHTML = "";
        if (!files.length) {
          fileList.innerHTML = "<p style='color:gray'>Nema fajlova.</p>";
          return;
        }
        for (const f of files) {
          const div = document.createElement("div");
          div.className = "file-item";
          const expires = new Date(f.uploadedAt + 24 * 60 * 60 * 1000).toLocaleString();
          const nameSpan = document.createElement("span");
          nameSpan.textContent = f.filename;
          const small = document.createElement("small");
          small.style.color = "gray";
          small.textContent = ` (briše se: ${expires})`;
          nameSpan.appendChild(small);
          const link = document.createElement("a");
          link.className = "download-btn";
          link.href = f.downloadUrl;
          link.textContent = "Download";
          div.appendChild(nameSpan);
          div.appendChild(link);
          fileList.appendChild(div);
        }
      } catch (err) {
        fileList.innerHTML = "<p style='color:red'>Greška pri učitavanju fajlova.</p>";
      }
    }

    async function uploadFile() {
      const input = document.getElementById("fileInput");
      const status = document.getElementById("status");

      if (!input.files.length) {
        status.innerText = "Izaberi fajl prvo!";
        return;
      }

      const file = input.files[0];
      status.innerText = "Uploadovanje...";
      const reader = new FileReader();

      reader.onload = async function(e) {
        const base64Data = e.target.result.split(",")[1];

        try {
          const response = await fetch("/.netlify/functions/upload", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name: file.name, data: base64Data })
          });

          if (!response.ok) throw new Error("Upload failed");
          status.innerText = "Fajl uspešno uploadovan!";
          await loadFiles();
        } catch (err) {
          status.innerText = "Greška pri uploadu: " + err.message;
        }
      };

      reader.readAsDataURL(file);
    }

    document.addEventListener("DOMContentLoaded", loadFiles);
  </script>
</body>
</html>
