<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>File Share Hub</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      margin: 0;
      padding: 0;
    }

    header {
      background: #1e1e1e;
      padding: 20px;
      text-align: center;
      border-bottom: 2px solid #333;
    }

    h1 {
      margin: 0;
      color: #00ff99;
    }

    .warning {
      background: #330000;
      color: #ff5555;
      padding: 15px;
      text-align: center;
      font-weight: bold;
      border-top: 2px solid red;
      border-bottom: 2px solid red;
    }

    .container {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    .upload-box,
    .files-box {
      background: #1c1c1c;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    input[type="file"] {
      margin-top: 10px;
      margin-bottom: 10px;
      color: white;
    }

    button {
      background: #00aa66;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #00cc77;
    }

    .file-item {
      background: #222;
      padding: 12px;
      border-radius: 8px;
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }

    .download-btn {
      background: #0066cc;
      text-decoration: none;
      color: white;
      padding: 8px 12px;
      border-radius: 5px;
    }

    .download-btn:hover {
      background: #0088ff;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: gray;
    }
  </style>
</head>
<body>

  <header>
    <h1>File Share Hub</h1>
    <p>Uploaduj i deli fajlove preko GitHub Pages</p>
  </header>

  <div class="warning">
    WARNING: This file may contain viruses or pirated versions. Download at your own risk.
  </div>

  <div class="container">

    <div class="upload-box">
      <h2>Upload fajla</h2>
      <p>Izaberi bilo koji tip fajla koji želiš da deliš (EXE, APK, ZIP, PDF, MP3, PNG, itd):</p>
      <input type="file" id="fileInput" multiple accept="*/*" />
      <br>
      <button onclick="uploadFile()">Upload</button>
      <p id="status"></p>
    </div>

    <div class="files-box">
      <h2>Dostupni fajlovi</h2>
      <div id="fileList"></div>
    </div>

  </div>

  <footer>
    © 2026 File Share Hub
  </footer>

  <script>
    let files = JSON.parse(localStorage.getItem('sharedFiles')) || [];

    function renderFiles() {
      const fileList = document.getElementById('fileList');
      fileList.innerHTML = '';

      files.forEach((file, index) => {
        const div = document.createElement('div');
        div.className = 'file-item';

        div.innerHTML = `
          <span>${file.name}</span>
          <a class="download-btn" href="${file.data}" download="${file.name}">Download</a>
        `;

        fileList.appendChild(div);
      });
    }

    function uploadFile() {
      const input = document.getElementById('fileInput');
      const status = document.getElementById('status');

      if (!input.files.length) {
        status.innerText = 'Izaberi fajl prvo!';
        return;
      }

      const selectedFiles = input.files;

      let uploaded = 0;

      for (let i = 0; i < selectedFiles.length; i++) {
        const file = selectedFiles[i];
        const reader = new FileReader();

        reader.onload = function(e) {
          files.push({
            name: file.name,
            data: e.target.result
          });

          uploaded++;

          localStorage.setItem('sharedFiles', JSON.stringify(files));
          renderFiles();

          status.innerText = uploaded + ' fajlova uploadovano!';
        };

        reader.readAsDataURL(file);
      }
    }

    renderFiles();
  </script>

</body>
</html>
